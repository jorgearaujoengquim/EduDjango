
{% load static %}
<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduDjango{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar mb-4">
            <div class="container-fluid">
              <a class="navbar-brand neon-text" href="{% url 'home' %}">> EduDjango_</a>
              
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              
              <div class="collapse navbar-collapse" id="navbarNav">
  
                <ul class="navbar-nav me-auto"> 
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'cursos' %}">Cursos</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'perfil' %}">Perfil</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'status' %}">Status</a>
                  </li>
                </ul>
              
                <ul class="navbar-nav">
                  <li class="nav-item">
                    {% if not user.is_authenticated %}
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                    {% else %}
                    <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    {% endif %}
                  </li>
                </ul>
              
              </div>
            </div>
          </nav>
    </header>
    
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
    
    <footer class="container mt-5">
        <hr class="custom-hr">
        <p class="text-center purple-text">/* @EduDjango 2024 - Sistema Acadêmico */</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
